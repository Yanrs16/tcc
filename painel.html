<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="painel.css">
    <title>Escolha de Usuário</title>
</head>
<body>
<div class="container">
    <h2 class="titulo">Escolha seu tipo de usuário</h2>
    <div class="user-options">
        <div class="user-option">
            <img src="./img//usuario.png" alt="Usuário" class="user-image">
            <h3>Usuário</h3>
            <a href="#" class="user-link">Entrar como Usuário</a>
        </div>
        <div class="user-option">
            <img src="./img//adm.png" alt="Administrador" class="user-image">
            <h3>Administrador</h3>
            <a href="#" class="user-link">Entrar como Administrador</a>
        </div>
    </div>
</div>
</body>
</html>
